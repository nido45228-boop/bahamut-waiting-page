<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【系統公告】伺服器目前忙碌中 - 巴哈姆特電玩資訊站</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="baha-fake-nav">
        <div class="nav-container">
            <a href="#" class="fake-logo">巴哈姆特</a>
            <div class="fake-links">GNN新聞 | 哈啦區 | 勇者小屋 | 電玩瘋</div>
        </div>
    </div>

    <div class="main-content">
        <div class="container">
            <div class="notice-title">
                <h1>【重要】伺服器連線繁忙中，請勇者稍候</h1>
            </div>

            <div class="content-box">
                <div class="info-area">
                    <div class="status-visual">
                        <div class="icon-placeholder">
                            <div class="pixel-dragon">💤🐲</div>
                        </div>
                    </div>

                    <div class="text-area">
                        <h2>尊敬的巴友您好：</h2>
                        <p>由於目前湧入大量「野生勇者」同時施放技能，造成連線異常。我們已派遣等級 99 的修復工匠處理中。</p>
                        <p>在等待召喚的空檔，可以幫忙清理一下路邊的史萊姆：</p>
                        
                        <div class="game-box">
                            <div class="game-header">【微型任務】清理路邊的史萊姆</div>
                            
                            <div class="game-stage solo">
                                <div class="slime-target-container">
                                    <div class="slime-visual" id="slime">
                                        <img src="slime.png" alt="史萊姆" class="slime-img-placeholder">
                                        </div>

                                    <div class="hp-bar-bg-small">
                                        <div class="hp-bar-fill-red" id="slime-hp" style="width: 100%;"></div>
                                    </div>
                                </div>
                            </div>

                            <p class="game-hint">（連續點擊史萊姆進行攻擊！）</p>
                            <div class="game-stats">
                                擊殺數: <span id="kill-count">0</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="action-area">
                    <button id="retry-btn">重新召喚伺服器</button>
                    <p class="count-hint">（如果連線失敗，按鈕會暫時進入冷卻，請冷靜）</p>
                </div>
            </div>

            <div class="baha-fake-footer">
                <p>Copyright © Bahamut Gamer's Community. All rights reserved.</p>
                <p>※ 請勿對螢幕施放「憤怒之擊」，本站不予理賠</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
